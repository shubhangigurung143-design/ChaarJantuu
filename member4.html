<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROJECT S4 | Final Member</title>

<link rel="stylesheet" href="style.css">

<style>

#missionComplete{
display:none;
animation:fadeIn 1.5s;
text-align:center;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

.big{
font-size:42px;
color:#c084fc;
margin-bottom:20px;
}

.loadingText{
margin-top:20px;
font-size:18px;
color:#9ca3af;
white-space:pre-line;
}

.countdown{
font-size:45px;
font-weight:bold;
color:#ffffff;
margin:25px 0;
letter-spacing:3px;
}

.mission{
font-size:22px;
color:#72ffae;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container" id="memberPage">

<div class="logo">
PROJECT S4
</div>

<div class="card">

<h1>ACCESS GRANTED</h1>

<div class="loading">
<div class="bar"></div>
</div>

<div class="member">
MEMBER 04<br>
SUPRIYA
</div>

<div class="status">
✓ Status: Unlocked
</div>

<div class="quote">
"All four members have been discovered..."
</div>

</div>

<div class="footer">
Completing Mission...
</div>

</div>

<div class="container" id="missionComplete">

<div class="big">
💜 CHAARJANTUU 💜
</div>

<h2>MISSION COMPLETE</h2>

<p class="loadingText">
██████████ 100%
</p>

<p class="mission">
✔ ALL 4 MEMBERS FOUND
</p>

<br>

<h3>FIRST MISSION</h3>

<h2>COMING SOON...</h2>

<div class="countdown" id="countdown">
Loading...
</div>

<p style="margin-top:15px;color:#9ca3af;">
The countdown has begun.<br>
See you on Day Zero.
</p>

</div>

<script>

setTimeout(function(){

document.getElementById("memberPage").style.display="none";

document.getElementById("missionComplete").style.display="block";

},6500);


// ===== 7 DAY COUNTDOWN =====

const launchDate = new Date();
launchDate.setDate(launchDate.getDate() + 7);
launchDate.setHours(19,0,0,0);

function updateCountdown(){

const now = new Date();

const distance = launchDate - now;

if(distance<=0){

document.getElementById("countdown").innerHTML="MISSION STARTED";

return;

}

const days=Math.floor(distance/(1000*60*60*24));
const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const mins=Math.floor((distance%(1000*60*60))/60000);
const secs=Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
days+"d "+hours+"h "+mins+"m "+secs+"s";

}

setInterval(updateCountdown,1000);

updateCountdown();

</script>

<script src="script.js"></script>

</body>
</html>
